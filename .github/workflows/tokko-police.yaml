# ║  Special Higher Police — 特秘第〇〇一号                    ║
# ║                                                              ║
# ║  根據法令:                                                   ║
# ║    治安維持法（明治五十八年法律第四十六号）               ║
# ║    出版法（明治二十六年法律第十五号）                   ║
# ║    新聞紙法（明治四十二年法律第四十一号）               ║
